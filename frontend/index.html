<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CarChapter – India's premier car marketplace for defence personnel. Verified listings, CSD pricing, and secure transactions." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>CarChapter – India's Premium Defence Car Marketplace</title>
    <script>
      // GitHub Pages SPA fallback: restore route redirected by 404.html.
      (function () {
        var redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (!redirect) return;

        var route = decodeURIComponent(redirect[1]).replace(/~and~/g, '&');
        var query = window.location.search
          .replace(/[?&]p=[^&]*/, '')
          .replace(/^&/, '?');
        var hash = window.location.hash || '';
        var newUrl = route + query + hash;
        window.history.replaceState(null, '', newUrl);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
